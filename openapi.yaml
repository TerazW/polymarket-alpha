openapi: 3.1.0

info:
  title: Belief Reaction System API
  version: 1.0.0
  description: |
    Evidence-first API for Polymarket belief reaction sensing.
    WebSocket real-time stream is described under /v1/stream (Upgrade: websocket).

servers:
  - url: https://api.example.com
    description: Production
  - url: http://localhost:8000
    description: Local

tags:
  - name: Radar
  - name: Evidence
  - name: Heatmap
  - name: Alerts
  - name: Replay
  - name: Stream

paths:
  /v1/health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  version: { type: string }
                required: [ok]

  /v1/radar:
    get:
      tags: [Radar]
      summary: Multi-market radar list for overview sorting
      operationId: getRadar
      parameters:
        - name: event_id
          in: query
          required: false
          schema: { type: integer, minimum: 1 }
          description: Filter by event id (Gamma event id)
        - name: tag
          in: query
          required: false
          schema: { type: string }
          description: Optional tag/segment filter
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [fragile_index_10m, leading_rate_10m, confidence, last_critical_ts, state_severity]
            default: fragile_index_10m
        - name: order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Radar result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RadarResponse"

  /v1/evidence:
    get:
      tags: [Evidence]
      summary: Evidence window package for a specific token and anchor time (t0)
      operationId: getEvidence
      parameters:
        - name: token_id
          in: query
          required: true
          schema: { type: string, minLength: 1 }
        - name: t0
          in: query
          required: true
          schema: { type: integer, format: int64 }
          description: Server timestamp (ms since epoch)
        - name: window_before_ms
          in: query
          required: false
          schema: { type: integer, minimum: 0, maximum: 3600000, default: 30000 }
        - name: window_after_ms
          in: query
          required: false
          schema: { type: integer, minimum: 0, maximum: 3600000, default: 60000 }
        - name: include_tiles_manifest
          in: query
          required: false
          schema: { type: boolean, default: true }
        - name: lod
          in: query
          required: false
          schema:
            type: integer
            enum: [250, 1000, 5000]
            default: 250
          description: Suggested LOD for heatmap tiles (ms per column)
      responses:
        "200":
          description: Evidence package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/alerts:
    get:
      tags: [Alerts]
      summary: List alerts (for ops panel and inbox)
      operationId: getAlerts
      parameters:
        - name: since
          in: query
          required: false
          schema: { type: integer, format: int64 }
          description: Server timestamp (ms). If omitted, returns most recent.
        - name: token_id
          in: query
          required: false
          schema: { type: string }
        - name: severity
          in: query
          required: false
          schema:
            type: string
            enum: [LOW, MEDIUM, HIGH, CRITICAL]
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [OPEN, ACKED, RESOLVED]
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: Alerts list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertsResponse"

  /v1/replay/catalog:
    get:
      tags: [Replay]
      summary: Search historical alerts/events for replay entry
      operationId: getReplayCatalog
      parameters:
        - name: from_ts
          in: query
          required: true
          schema: { type: integer, format: int64 }
        - name: to_ts
          in: query
          required: true
          schema: { type: integer, format: int64 }
        - name: token_id
          in: query
          required: false
          schema: { type: string }
        - name: event_type
          in: query
          required: false
          schema:
            type: string
            enum: [SHOCK, REACTION, LEADING, BELIEF_STATE, ALERT]
        - name: severity
          in: query
          required: false
          schema:
            type: string
            enum: [LOW, MEDIUM, HIGH, CRITICAL]
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 1000, default: 200 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: Replay catalog entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplayCatalogResponse"

  /v1/heatmap/tiles:
    get:
      tags: [Heatmap]
      summary: Fetch heatmap tiles for a token over time range
      operationId: getHeatmapTiles
      parameters:
        - name: token_id
          in: query
          required: true
          schema: { type: string, minLength: 1 }
        - name: from_ts
          in: query
          required: true
          schema: { type: integer, format: int64 }
        - name: to_ts
          in: query
          required: true
          schema: { type: integer, format: int64 }
        - name: lod
          in: query
          required: false
          schema:
            type: integer
            enum: [250, 1000, 5000]
            default: 250
          description: Time resolution in ms per column
        - name: tile_ms
          in: query
          required: false
          schema:
            type: integer
            enum: [5000, 10000, 15000]
            default: 10000
        - name: price_min
          in: query
          required: false
          schema: { type: number }
          description: Optional clip range; if omitted, server returns full range for this tile band
        - name: price_max
          in: query
          required: false
          schema: { type: number }
        - name: band
          in: query
          required: false
          schema:
            type: string
            enum: [FULL, BEST_5, BEST_10, BEST_20]
            default: FULL
          description: Server-side banding strategy (to reduce payload)
      responses:
        "200":
          description: Tiles response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeatmapTilesResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/stream:
    get:
      tags: [Stream]
      summary: WebSocket real-time stream (alerts/state/data health)
      description: |
        Upgrade this HTTP request to a WebSocket connection.
        Client sends a subscribe message, server pushes event envelopes.

        Client -> Server (JSON):
          { "type": "subscribe", "topics": ["alerts","states","data_health"], "token_ids": ["..."], "event_id": 123 }

        Server -> Client (JSON event envelope):
          {
            "type": "event",
            "topic": "alerts" | "states" | "data_health",
            "ts": 1735960000000,
            "payload": { ... see schemas below ... }
          }

        Heartbeat:
          Server sends { "type":"ping","ts":... } every 10s
          Client replies { "type":"pong","ts":... }

        Reconnect:
          Client can resume with last_seen_ts:
          { "type":"subscribe", "topics":[...], "last_seen_ts": 1735960000000, ... }
      operationId: streamWebsocket
      responses:
        "101":
          description: Switching Protocols (WebSocket)

components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error: { type: string }
        code: { type: string }
        details: { type: object, additionalProperties: true }
      required: [error]

    BeliefState:
      type: string
      enum: [STABLE, FRAGILE, CRACKING, BROKEN]

    ReactionType:
      type: string
      enum: [VACUUM, SWEEP, CHASE, PULL, HOLD, DELAYED, NO_IMPACT]

    LeadingEventType:
      type: string
      enum: [PRE_SHOCK_PULL, DEPTH_COLLAPSE, GRADUAL_THINNING]

    AlertSeverity:
      type: string
      enum: [LOW, MEDIUM, HIGH, CRITICAL]

    AlertStatus:
      type: string
      enum: [OPEN, ACKED, RESOLVED]

    Side:
      type: string
      enum: [BID, ASK]

    EvidenceRef:
      type: object
      properties:
        token_id: { type: string }
        t0: { type: integer, format: int64, description: "ms since epoch" }
      required: [token_id, t0]

    DataHealth:
      type: object
      properties:
        missing_bucket_ratio_10m: { type: number, minimum: 0, maximum: 1 }
        rebuild_count_10m: { type: integer, minimum: 0 }
        hash_mismatch_count_10m: { type: integer, minimum: 0 }
        last_rebuild_ts: { type: integer, format: int64, nullable: true }
        last_hash_mismatch_ts: { type: integer, format: int64, nullable: true }
      required: [missing_bucket_ratio_10m, rebuild_count_10m, hash_mismatch_count_10m]

    MarketSummary:
      type: object
      properties:
        token_id: { type: string }
        condition_id: { type: string }
        event_id: { type: integer }
        title: { type: string }
        event_slug: { type: string }
        market_slug: { type: string }
        outcome: { type: string }
        tick_size: { type: number }
        last_price: { type: number, minimum: 0, maximum: 1 }
      required: [token_id, condition_id, title, outcome, tick_size]

    RadarRow:
      type: object
      properties:
        market: { $ref: "#/components/schemas/MarketSummary" }
        belief_state: { $ref: "#/components/schemas/BeliefState" }
        state_since_ts: { type: integer, format: int64 }
        state_severity: { type: integer, minimum: 0, maximum: 3, description: "STABLE=0..BROKEN=3" }
        fragile_index_10m: { type: number, minimum: 0 }
        leading_rate_10m: { type: number, minimum: 0 }
        confidence: { type: number, minimum: 0, maximum: 100 }
        data_health: { $ref: "#/components/schemas/DataHealth" }
        last_critical_alert:
          type: object
          nullable: true
          properties:
            ts: { type: integer, format: int64 }
            alert_id: { type: string, format: uuid }
            type: { type: string }
            evidence_ref: { $ref: "#/components/schemas/EvidenceRef" }
      required: [market, belief_state, state_since_ts, state_severity, fragile_index_10m, leading_rate_10m, confidence, data_health]

    RadarResponse:
      type: object
      properties:
        rows:
          type: array
          items: { $ref: "#/components/schemas/RadarRow" }
        limit: { type: integer }
        offset: { type: integer }
        total: { type: integer }
      required: [rows, limit, offset, total]

    AnchorLevel:
      type: object
      properties:
        price: { type: number, minimum: 0, maximum: 1 }
        side: { $ref: "#/components/schemas/Side" }
        score: { type: number }
        rank: { type: integer, minimum: 1 }
      required: [price, side, score, rank]

    ShockEvent:
      type: object
      properties:
        id: { type: string, format: uuid }
        token_id: { type: string }
        ts: { type: integer, format: int64 }
        price: { type: number }
        side: { $ref: "#/components/schemas/Side" }
        trade_vol: { type: number }
        baseline_size: { type: number }
        tick_size: { type: number }
        trigger: { type: string, enum: [VOLUME, CONSECUTIVE, BOTH] }
      required: [id, token_id, ts, price, side, tick_size, trigger]

    ReactionEvent:
      type: object
      properties:
        id: { type: string, format: uuid }
        token_id: { type: string }
        shock_id: { type: string, format: uuid, nullable: true }
        ts_start: { type: integer, format: int64 }
        ts_end: { type: integer, format: int64 }
        window: { type: string, enum: [FAST, SLOW] }
        price: { type: number }
        side: { $ref: "#/components/schemas/Side" }
        reaction: { $ref: "#/components/schemas/ReactionType" }
        proof:
          type: object
          properties:
            drop_ratio: { type: number }
            refill_ratio: { type: number, nullable: true }
            vacuum_duration_ms: { type: integer, nullable: true }
            shift_ticks: { type: integer, nullable: true }
            time_to_refill_ms: { type: integer, nullable: true }
          additionalProperties: true
      required: [id, token_id, ts_start, ts_end, window, price, side, reaction]

    LeadingEvent:
      type: object
      properties:
        id: { type: string, format: uuid }
        token_id: { type: string }
        ts: { type: integer, format: int64 }
        type: { $ref: "#/components/schemas/LeadingEventType" }
        side: { $ref: "#/components/schemas/Side" }
        price_band:
          type: object
          properties:
            price_min: { type: number }
            price_max: { type: number }
          required: [price_min, price_max]
        proof:
          type: object
          additionalProperties: true
      required: [id, token_id, ts, type, side, price_band]

    BeliefStateChange:
      type: object
      properties:
        id: { type: string, format: uuid }
        token_id: { type: string }
        ts: { type: integer, format: int64 }
        belief_state: { $ref: "#/components/schemas/BeliefState" }
        evidence_refs:
          type: array
          items: { type: string, format: uuid }
        note: { type: string, nullable: true }
      required: [id, token_id, ts, belief_state, evidence_refs]

    TilesManifest:
      type: object
      properties:
        token_id: { type: string }
        lod_ms: { type: integer, enum: [250, 1000, 5000] }
        tile_ms: { type: integer, enum: [5000, 10000, 15000] }
        band: { type: string, enum: [FULL, BEST_5, BEST_10, BEST_20] }
        available_from_ts: { type: integer, format: int64 }
        available_to_ts: { type: integer, format: int64 }
      required: [token_id, lod_ms, tile_ms, band, available_from_ts, available_to_ts]

    EvidenceResponse:
      type: object
      properties:
        token_id: { type: string }
        t0: { type: integer, format: int64 }
        window:
          type: object
          properties:
            from_ts: { type: integer, format: int64 }
            to_ts: { type: integer, format: int64 }
          required: [from_ts, to_ts]
        market: { $ref: "#/components/schemas/MarketSummary" }
        anchors:
          type: array
          items: { $ref: "#/components/schemas/AnchorLevel" }
        shocks:
          type: array
          items: { $ref: "#/components/schemas/ShockEvent" }
        reactions:
          type: array
          items: { $ref: "#/components/schemas/ReactionEvent" }
        leading_events:
          type: array
          items: { $ref: "#/components/schemas/LeadingEvent" }
        belief_states:
          type: array
          items: { $ref: "#/components/schemas/BeliefStateChange" }
        data_health: { $ref: "#/components/schemas/DataHealth" }
        tiles_manifest:
          oneOf:
            - { $ref: "#/components/schemas/TilesManifest" }
            - { type: "null" }
      required: [token_id, t0, window, market, anchors, shocks, reactions, leading_events, belief_states, data_health]

    Alert:
      type: object
      properties:
        alert_id: { type: string, format: uuid }
        token_id: { type: string }
        ts: { type: integer, format: int64 }
        severity: { $ref: "#/components/schemas/AlertSeverity" }
        status: { $ref: "#/components/schemas/AlertStatus" }
        type: { type: string }
        summary: { type: string }
        confidence: { type: number, minimum: 0, maximum: 100 }
        evidence_ref: { $ref: "#/components/schemas/EvidenceRef" }
        payload:
          type: object
          additionalProperties: true
      required: [alert_id, token_id, ts, severity, status, type, summary, confidence, evidence_ref]

    AlertsResponse:
      type: object
      properties:
        rows:
          type: array
          items: { $ref: "#/components/schemas/Alert" }
        limit: { type: integer }
        offset: { type: integer }
        total: { type: integer }
      required: [rows, limit, offset, total]

    ReplayCatalogEntry:
      type: object
      properties:
        kind: { type: string, enum: [SHOCK, REACTION, LEADING, BELIEF_STATE, ALERT] }
        id: { type: string, format: uuid }
        token_id: { type: string }
        ts: { type: integer, format: int64 }
        severity:
          oneOf:
            - { $ref: "#/components/schemas/AlertSeverity" }
            - { type: "null" }
        label: { type: string }
        evidence_ref: { $ref: "#/components/schemas/EvidenceRef" }
      required: [kind, id, token_id, ts, label, evidence_ref]

    ReplayCatalogResponse:
      type: object
      properties:
        rows:
          type: array
          items: { $ref: "#/components/schemas/ReplayCatalogEntry" }
        limit: { type: integer }
        offset: { type: integer }
        total: { type: integer }
      required: [rows, limit, offset, total]

    HeatmapTileMeta:
      type: object
      properties:
        tile_id: { type: string }
        token_id: { type: string }
        lod_ms: { type: integer, enum: [250, 1000, 5000] }
        tile_ms: { type: integer }
        band: { type: string, enum: [FULL, BEST_5, BEST_10, BEST_20] }
        t_start: { type: integer, format: int64 }
        t_end: { type: integer, format: int64 }
        tick_size: { type: number }
        price_min: { type: number }
        price_max: { type: number }
        rows: { type: integer, minimum: 1 }
        cols: { type: integer, minimum: 1 }
        encoding:
          type: object
          properties:
            dtype: { type: string, enum: [uint16] }
            layout: { type: string, enum: [row_major] }
            scale: { type: string, enum: [log1p_clip] }
            clip_pctl: { type: number, enum: [0.95, 0.98, 0.99] }
            clip_value: { type: number, nullable: true }
            endian: { type: string, enum: [little] }
          required: [dtype, layout, scale, clip_pctl, endian]
        compression:
          type: object
          properties:
            algo: { type: string, enum: [zstd, lz4, none] }
            level: { type: integer, nullable: true }
          required: [algo]
        payload_b64: { type: string, description: "Base64 of compressed bytes for matrix payload" }
        checksum:
          type: object
          properties:
            algo: { type: string, enum: [xxh3_64] }
            value: { type: string }
          required: [algo, value]
      required: [tile_id, token_id, lod_ms, tile_ms, band, t_start, t_end, tick_size, price_min, price_max, rows, cols, encoding, compression, payload_b64, checksum]

    HeatmapTilesResponse:
      type: object
      properties:
        manifest:
          type: object
          properties:
            token_id: { type: string }
            from_ts: { type: integer, format: int64 }
            to_ts: { type: integer, format: int64 }
            lod_ms: { type: integer, enum: [250, 1000, 5000] }
            tile_ms: { type: integer }
            band: { type: string, enum: [FULL, BEST_5, BEST_10, BEST_20] }
          required: [token_id, from_ts, to_ts, lod_ms, tile_ms, band]
        tiles:
          type: array
          items: { $ref: "#/components/schemas/HeatmapTileMeta" }
      required: [manifest, tiles]

    # WebSocket stream schemas (for documentation)
    StreamEnvelope:
      type: object
      properties:
        type: { type: string, enum: [event, ping, pong, error] }
        topic: { type: string, enum: [alerts, states, data_health] }
        ts: { type: integer, format: int64 }
        payload:
          oneOf:
            - { $ref: "#/components/schemas/Alert" }
            - { $ref: "#/components/schemas/BeliefStateChange" }
            - { $ref: "#/components/schemas/DataHealthUpdate" }
            - { type: object, additionalProperties: true }
      required: [type, ts]

    DataHealthUpdate:
      type: object
      properties:
        token_id: { type: string }
        ts: { type: integer, format: int64 }
        data_health: { $ref: "#/components/schemas/DataHealth" }
      required: [token_id, ts, data_health]
