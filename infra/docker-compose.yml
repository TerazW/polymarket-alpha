version: '3.8'

services:
  # TimescaleDB - 时序数据库，用于存储 heatmap 数据
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: belief-reaction-db
    ports:
      - "5433:5432"  # 用 5433 避免和本机 PostgreSQL 冲突
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: belief_reaction
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - 用于实时事件推送和缓存（可选，MVP 阶段可以不用）
  redis:
    image: redis:7-alpine
    container_name: belief-reaction-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  timescale_data:
  redis_data:
