version: '3.8'

services:
  # ==========================================================================
  # Backend API Service
  # ==========================================================================
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: belief-reaction-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@timescaledb:5432/belief_reaction
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
      - ENV=development
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==========================================================================
  # TimescaleDB - 时序数据库，用于存储 heatmap 数据
  # ==========================================================================
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: belief-reaction-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: belief_reaction
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Redis - 用于实时事件推送和缓存
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: belief-reaction-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  timescale_data:
  redis_data:
