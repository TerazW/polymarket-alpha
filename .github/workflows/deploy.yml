name: Deploy to AWS

on:
  push:
    branches:
      - main        # Production deployment only
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 821482074659.dkr.ecr.us-east-1.amazonaws.com
  ECS_CLUSTER: market-sensemaking-cluster

jobs:
  # ==========================================================================
  # Determine Environment
  # ==========================================================================
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      should_deploy: ${{ steps.set-env.outputs.should_deploy }}

    steps:
      - name: Determine environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/staging" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "environment=none" >> $GITHUB_OUTPUT
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

  # ==========================================================================
  # Run Tests First
  # ==========================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.should_deploy == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run critical tests
        run: |
          python -m pytest tests/ \
            --ignore=tests/adversarial \
            --ignore=tests/integration \
            -v --tb=short \
            -x  # Stop on first failure

  # ==========================================================================
  # Build Docker Images
  # ==========================================================================
  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [setup, test]
    if: needs.setup.outputs.should_deploy == 'true'

    strategy:
      matrix:
        service:
          - name: api
            dockerfile: infra/Dockerfile.api
          - name: collector
            dockerfile: infra/Dockerfile.collector
          - name: tile-worker
            dockerfile: infra/Dockerfile.tile_worker

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/market-sensemaking/${{ matrix.service.name }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/market-sensemaking/${{ matrix.service.name }}:latest
            ${{ env.ECR_REGISTRY }}/market-sensemaking/${{ matrix.service.name }}:${{ needs.setup.outputs.environment }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================================================
  # Database Migration (if needed)
  # ==========================================================================
  migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: needs.setup.outputs.should_deploy == 'true'
    environment: ${{ needs.setup.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check for migration files
        id: check-migrations
        run: |
          # Check if any migration files changed in this commit
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E "^infra/migrations/" || true)
          if [ -n "$CHANGED" ]; then
            echo "has_migrations=true" >> $GITHUB_OUTPUT
            echo "Migration files changed:"
            echo "$CHANGED"
          else
            echo "has_migrations=false" >> $GITHUB_OUTPUT
            echo "No migration files changed."
          fi

      - name: Run database migrations
        if: steps.check-migrations.outputs.has_migrations == 'true'
        env:
          DB_HOST: ${{ secrets.TIMESCALEDB_HOST }}
          DB_PORT: ${{ secrets.TIMESCALEDB_PORT }}
          DB_NAME: ${{ secrets.TIMESCALEDB_NAME }}
          DB_USER: ${{ secrets.TIMESCALEDB_USER }}
          DB_PASSWORD: ${{ secrets.TIMESCALEDB_PASSWORD }}
        run: |
          echo "Running database migrations..."

          # Install psql
          sudo apt-get update && sudo apt-get install -y postgresql-client

          # Run each migration file in order
          for file in $(ls -1 infra/migrations/*.sql | sort); do
            echo "Applying: $file"
            PGPASSWORD=$DB_PASSWORD psql \
              -h $DB_HOST \
              -p $DB_PORT \
              -U $DB_USER \
              -d $DB_NAME \
              -f "$file" \
              -v ON_ERROR_STOP=1
          done

          echo "Migrations completed successfully."

  # ==========================================================================
  # Deploy to ECS
  # ==========================================================================
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [setup, build, migrate]
    if: needs.setup.outputs.should_deploy == 'true'
    environment: ${{ needs.setup.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy API service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service market-sensemaking-api \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deploy Collector service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service market-sensemaking-collector \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deploy Tile Worker service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service market-sensemaking-tile-worker \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for services to stabilize
        run: |
          echo "Waiting for API service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services market-sensemaking-api \
            --region ${{ env.AWS_REGION }} || true

          echo "Waiting for Collector service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services market-sensemaking-collector \
            --region ${{ env.AWS_REGION }} || true

          echo "Waiting for Tile Worker service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services market-sensemaking-tile-worker \
            --region ${{ env.AWS_REGION }} || true

  # ==========================================================================
  # Health Check
  # ==========================================================================
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [setup, deploy]
    if: needs.setup.outputs.should_deploy == 'true'

    steps:
      - name: Wait for deployment
        run: sleep 60

      - name: Check API health
        run: |
          echo "Checking API health..."

          MAX_RETRIES=5
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://api.marketsensemaking.com/v1/health || true)

            if [ "$RESPONSE" == "200" ]; then
              echo "API is healthy! (HTTP $RESPONSE)"
              exit 0
            fi

            echo "Attempt $((RETRY_COUNT + 1))/$MAX_RETRIES: HTTP $RESPONSE"
            RETRY_COUNT=$((RETRY_COUNT + 1))
            sleep 15
          done

          echo "ERROR: API health check failed after $MAX_RETRIES attempts"
          exit 1

      - name: Deployment summary
        if: success()
        run: |
          echo "=========================================="
          echo "DEPLOYMENT SUCCESSFUL"
          echo "=========================================="
          echo ""
          echo "Environment: ${{ needs.setup.outputs.environment }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo ""
          echo "Services deployed:"
          echo "  - market-sensemaking-api"
          echo "  - market-sensemaking-collector"
          echo "  - market-sensemaking-tile-worker"
          echo ""
          echo "API URL: https://api.marketsensemaking.com/v1/health"

  # ==========================================================================
  # Notify on Failure
  # ==========================================================================
  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [setup, test, build, migrate, deploy, health-check]
    if: failure()

    steps:
      - name: Deployment failed
        run: |
          echo "=========================================="
          echo "DEPLOYMENT FAILED"
          echo "=========================================="
          echo ""
          echo "Environment: ${{ needs.setup.outputs.environment }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo ""
          echo "Check the workflow logs for details."
          echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
