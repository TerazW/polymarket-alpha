[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Markers for CI gates
markers =
    determinism: Tests for deterministic behavior (hash, replay, state)
    adversarial: Tests for edge cases and manipulation resistance
    security: Tests for ACL, audit, and access control
    integration: Tests requiring external services (database)
    slow: Tests that take longer than 5 seconds

asyncio_mode = strict
